<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Newsletter Archive — 4minit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #f8f5f0; color: #1a1a2e; min-height: 100vh; }
    header { background: #1a1a2e; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
    header .logo { font-family: Georgia, serif; font-size: 22px; font-weight: bold; color: #fff; letter-spacing: 2px; text-decoration: none; }
    header nav a { color: #8888aa; font-size: 13px; text-decoration: none; margin-left: 20px; }
    header nav a:hover { color: #e05c2a; }
    .hero { background: #1a1a2e; padding: 40px 32px 48px; text-align: center; }
    .hero h1 { font-family: Georgia, serif; font-size: 28px; color: #fff; margin-bottom: 8px; }
    .hero p  { font-size: 15px; color: #8888aa; }
    .container { max-width: 680px; margin: 0 auto; padding: 40px 20px; }
    ul { list-style: none; }
    li { margin-bottom: 12px; }
    li a { display: block; background: #fff; border-radius: 8px; padding: 16px 20px; font-size: 15px; color: #1a1a2e; text-decoration: none; font-weight: 500; box-shadow: 0 1px 4px rgba(0,0,0,.06); transition: box-shadow .15s, color .15s; }
    li a:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); color: #e05c2a; }
    .empty { text-align: center; color: #888; padding: 60px 0; font-size: 15px; }
    footer { background: #1a1a2e; color: #555; text-align: center; padding: 20px; font-size: 12px; margin-top: 60px; }
    footer a { color: #e05c2a; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <a class='logo' href='/'>4minit</a>
    <nav><a href='/'>Subscribe</a></nav>
  </header>
  <div class='hero'>
    <h1>Past Editions</h1>
    <p>Every morning, Mauritius in 4 minutes.</p>
  </div>
  <div class='container'>
    <p class='empty'>No newsletters published yet. Check back soon.</p>
  </div>
  <footer>
    <a href='/'>4minit.xyz</a> &nbsp;·&nbsp; Mauritius Morning Brief
  </footer>
</body>
</html>
